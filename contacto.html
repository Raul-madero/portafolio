<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raul Madero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/app.css">
    
</head>
<body>
    <header class="container-xl bg sticky-top bg-info bg-gradient justify-content-between">
        <nav class="navbar navbar-expand-lg bg-body-primary">
            <div class="container-fluid justify-content-between">
                <a href="index.html" class="navbar-brand">Raul<strong>Madero</strong></a>
                <button 
                    class="navbar-toggler" 
                    type="button" 
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" 
                    aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a href="index.html" class="nav-link text-primary">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="sobreMi.html" class="nav-link text-primary">Acerca de mi</a>
                        </li>
                        <li class="nav-item">
                            <a href="proyectos.html" class="nav-link text-primary">Proyectos</a>
                        </li>
                        <li class="nav-item">
                            <a href="contacto.html" class="nav-link text-primary">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container-xl">
        <div class="d-flex align-items-center justify-content-center">
            <h1 class="text-center w-75 my-4">Ingresa tus datos y nos pondremos en contacto contigo</h1>
        </div>
        <form action="" class="container-fluid my-5 formulario">
            <fieldset>
                <legend class="text-center">Datos personales</legend>
                <div class="mb-2">
                    <label for="name" class="form-label">Ingresa tu nombre:</label>
                    <input type="text" class="form-control bg-dark text-light" placeholder="Tu nombre">
                </div>
                <div class="mb-2">
                    <label for="email" class="form-label">Ingresa tu correo:</label>
                    <input type="email" class="form-control bg-dark" placeholder="Tu email">
                </div>
                <div class="mb-2">
                    <label for="telefono" class="form-label">Ingresa tu telefono:</label>
                    <input type="tel" class="form-control bg-dark" placeholder="Tu telefono">
                </div>
                <div class="mb-2">
                    <label for="mensaje" class="form-label">Ingresa tu telefono:</label>
                    <textarea name="mensaje" id="mensaje" class="form-control bg-dark" cols="30" rows="10"></textarea>
                </div>
                <button type="submit" class="btn btn-outline-info btn-lg" data-bs-toggle="button">Enviar</button>
            </fieldset>
        </form>
    </main>
    <footer class="container-xl bg-info p-5 footer">
        <div class="container-fluid p-3 text-center">
            <div class="d-flex flex-column flex-md-row align-items-center">
                <div class="col align-items-center my-2 md-m-0">
                    <a href="contacto.html" class="btn btn-secondary">Contactame</a>
                </div>
                <div class="col align-items-center my-2 md-m-0">
                    <a href="index.html" class="navbar-brand text-dark fs-1">Raul<strong class="text-secondary">Madero</strong></a>
                </div>
                <div class="col align-items-center my-2 md-m-0">
                    <div class="row align-items-center justify-content-center">
                        <div class="col align-items-center">
                            <a href="https://www.linkedin.com/in/raul-madero-28060548/" target="blank">
                                <i class="fa-brands fa-linkedin fa-2xl" style="color: #ffffff;"></i>
                            </a>
                        </div>
                        <div class="col align-items-center">
                            <a href="https://github.com/Raul-madero" target="blank">
                                <i class="fa-brands fa-github fa-2xl" style="color: #ffffff;"></i>
                            </a>
                        </div>
                        <div class="col align-items-center">
                            <a href="https://twitter.com/rmaderoIV" target="blank">
                                <i class="fa-brands fa-x-twitter fa-2xl" style="color: #ffffff;"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://kit.fontawesome.com/89daf2435a.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
</body>
</html>
